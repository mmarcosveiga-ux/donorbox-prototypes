                            <div style={{ display: "flex", flexDirection: "column", gap: 4, padding: "0 0 4px" }}>
                              <span style={{ fontSize: 12, fontWeight: 500, color: "#6B7280", lineHeight: "16px" }}>Type</span>
                              {MFO.sType.map((v) => <label key={v} style={{ display: "flex", alignItems: "center", gap: 8, height: 40, padding: "8px", cursor: "pointer" }}><input type="checkbox" checked={mf.sType.includes(v)} onChange={() => togA("sType", v)} style={{ width: 20, height: 20, accentColor: "#128AED", flexShrink: 0 }} /><span style={{ fontSize: 14, fontWeight: 500, color: "#111928", lineHeight: "20px" }}>{v}</span></label>)}
                            </div>
                            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                              <span style={{ fontSize: 12, fontWeight: 500, color: "#6B7280", lineHeight: "16px" }}>Activity Based Type</span>
                              {MFO.ss.map((v) => <label key={v} style={{ display: "flex", alignItems: "center", gap: 8, height: 40, padding: "8px", cursor: "pointer" }}><input type="checkbox" checked={mf.ss.includes(v)} onChange={() => togA("ss", v)} style={{ width: 20, height: 20, accentColor: "#128AED", flexShrink: 0 }} /><span style={{ fontSize: 14, fontWeight: 500, color: "#111928", lineHeight: "20px" }}>{v}</span></label>)}
                            </div>
                          </>)}
                          {["mb", "ed", "re", "ge", "pr"].includes(sec.k) && MFO[sec.k].map((v) => <label key={v} style={{ display: "flex", alignItems: "center", gap: 10, padding: "4px 0", cursor: "pointer" }}><input type="checkbox" checked={mf[sec.k].includes(v)} onChange={() => togA(sec.k, v)} style={{ width: 18, height: 18, accentColor: "#128AED" }} /><span style={{ fontSize: 14 }}>{v}</span></label>)}
                        </div>
                      )}
                    </div>
                  ); })}
                </div>
                <div style={{ display: "flex", gap: 16, padding: 16, borderTop: "1px solid #E5E7EB", alignItems: "center" }}>
                  <button onClick={() => closeMF()} style={{ display: "flex", alignItems: "center", height: 32, padding: "6px 16px", fontSize: 14, fontWeight: 500, color: "#1F2A37", background: "#FFF", border: "1px solid #D1D5DB", borderRadius: 4, cursor: "pointer", flexShrink: 0 }}>Cancel</button>
                  {(() => { const changed = JSON.stringify(mf) !== JSON.stringify(mfSnap.current); return (
                    <button onClick={changed ? () => closeMF(false) : undefined} style={{ display: "flex", flex: 1, height: 32, justifyContent: "center", alignItems: "center", fontSize: 14, fontWeight: 500, color: "#FFF", background: changed ? "#128AED" : "#93C5FD", border: "none", borderRadius: 4, cursor: changed ? "pointer" : "default" }}>Apply</button>
                  ); })()}
                </div>
              </div>
            </>
          )}

          {/* EDIT COLUMNS DRAWER */}
          {drawerOpen && (
            <>
              <div onClick={() => closeDrawer()} style={{ position: "fixed", inset: 0, background: "rgba(17,25,40,.4)", zIndex: 150, animation: drawerClosing ? "fadeOut .28s ease forwards" : "fadeIn .28s ease" }} />
              <div style={{ position: "fixed", top: 0, right: 0, bottom: 0, width: 320, maxWidth: "90vw", background: "#FFF", zIndex: 200, display: "flex", flexDirection: "column", boxShadow: "-8px 0 40px rgba(0,0,0,.12)", animation: drawerClosing ? "slideOut .28s ease forwards" : "slideIn .28s ease" }}>
                {/* header */}
                <div style={{ display: "flex", alignItems: "center", padding: "24px 24px 16px", gap: 8 }}>
                  <h3 style={{ fontSize: 18, fontWeight: 600, margin: 0, color: "#111928", flex: 1 }}>Edit Columns</h3>
                  <div style={{ position: "relative" }} onMouseEnter={(e) => { if (isOriginalDefault) return; const t = e.currentTarget.querySelector('[data-tip]'); if (t) t.style.opacity = 1; e.currentTarget.querySelector('button').style.background = '#F3F4F6'; e.currentTarget.querySelector('button').style.border = '1px solid #D1D5DB'; }} onMouseLeave={(e) => { const t = e.currentTarget.querySelector('[data-tip]'); if (t) t.style.opacity = 0; e.currentTarget.querySelector('button').style.background = 'rgba(255,255,255,0)'; e.currentTarget.querySelector('button').style.border = '1px solid transparent'; }}>
                    <button onClick={isOriginalDefault ? undefined : resetToOriginal} style={{ width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(255,255,255,0)", border: "1px solid transparent", borderRadius: 4, cursor: isOriginalDefault ? "default" : "pointer", padding: 0, transition: "background .15s, border-color .15s" }}>
                      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.85355 0.646447C4.04882 0.841709 4.04882 1.15829 3.85355 1.35355L2.20711 3H9C12.3137 3 15 5.68629 15 9C15 12.3137 12.3137 15 9 15C5.68629 15 3 12.3137 3 9C3 8.72386 3.22386 8.5 3.5 8.5C3.77614 8.5 4 8.72386 4 9C4 11.7614 6.23858 14 9 14C11.7614 14 14 11.7614 14 9C14 6.23858 11.7614 4 9 4H2.20711L3.85355 5.64645C4.04882 5.84171 4.04882 6.15829 3.85355 6.35355C3.65829 6.54882 3.34171 6.54882 3.14645 6.35355L0.646447 3.85355C0.451184 3.65829 0.451184 3.34171 0.646447 3.14645L3.14645 0.646447C3.34171 0.451184 3.65829 0.451184 3.85355 0.646447Z" fill={isOriginalDefault ? "#D1D5DB" : "#111928"}/></svg>
                    </button>
                    <div data-tip style={{ position: "absolute", top: "100%", right: 0, marginTop: 8, padding: "8px 12px", background: "#1F2A37", color: "#FFF", fontSize: 12, fontWeight: 500, borderRadius: 6, whiteSpace: "nowrap", opacity: 0, transition: "opacity .15s", pointerEvents: "none", zIndex: 10 }}>Restore Original View</div>
                  </div>
                  <button onClick={() => closeDrawer()} style={{ width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 6l8 8M14 6l-8 8" stroke="#111928" strokeWidth="1.5" strokeLinecap="round" /></svg>
                  </button>
                </div>

                {/* select all */}
                <label style={{ display: "flex", alignItems: "center", gap: 14, padding: "8px 24px", cursor: "pointer" }}>
                  <div onClick={(e) => { e.preventDefault(); handleSelectAll(); }} style={{ width: 18, height: 18, borderRadius: 4, border: allSelected || someSelected ? "none" : "1.5px solid #D1D5DB", background: allSelected || someSelected ? "#128AED" : "#FFF", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0 }}>
                    {allSelected && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="#FFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    {someSelected && !allSelected && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 6h6" stroke="#FFF" strokeWidth="1.5" strokeLinecap="round"/></svg>}
                  </div>
                  <span style={{ fontSize: 14, fontWeight: 500, color: "#111928" }}>Select All</span>
                </label>

                <div style={{ height: 1, background: "#E5E7EB", margin: "0 24px" }} />

                {/* scrollable column list */}
                <div style={{ flex: 1, overflowY: "auto", padding: "8px 0" }}>
                  {ALL_COLUMNS.map((col, i) => {
                    const checked = drawerCols.includes(col.key);
                    const hasCh = col.children && col.children.length > 0;
                    return (
                      <div key={col.key}>
                        <label style={{ display: "flex", alignItems: "center", gap: 14, padding: "11px 24px", cursor: col.locked ? "default" : "pointer", opacity: 1, animation: drawerClosing ? "none" : `rowIn 0.3s ease ${60 + i * 30}ms both` }}>
                          <div onClick={(e) => { e.preventDefault(); toggleDrawerCol(col.key); }} style={{ width: 18, height: 18, borderRadius: 4, border: checked ? "none" : "1.5px solid #D1D5DB", background: checked ? "#128AED" : "#FFF", display: "flex", alignItems: "center", justifyContent: "center", cursor: col.locked ? "default" : "pointer", flexShrink: 0, opacity: col.locked ? 0.6 : 1 }}>
                            {checked && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="#FFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                          </div>
                          <span style={{ fontSize: 14, fontWeight: checked ? 500 : 400, color: "#111928", flex: 1 }}>{col.label}</span>
                          {col.locked && <span style={{ fontSize: 12, fontWeight: 500, color: "#6B7280", background: "#F3F4F6", padding: "3px 10px", borderRadius: 6, border: "1px solid #E5E7EB" }}>Mandatory</span>}
                        </label>
                        {col.description && <p style={{ padding: "0 24px 8px 56px", fontSize: 12, color: "#6B7280", lineHeight: "16px", margin: 0 }}>{col.description}</p>}
                        {hasCh && checked && (
                          <div style={{ paddingLeft: 38 }}>
                            {col.children.map((child) => {
                              const chOn = drawerCols.includes(child.key);
                              return (
                                <label key={child.key} style={{ display: "flex", alignItems: "center", gap: 14, padding: "11px 24px 11px 0", cursor: "pointer" }}>
                                  <div onClick={(e) => { e.preventDefault(); toggleDrawerChildCol(child.key); }} style={{ width: 18, height: 18, borderRadius: 4, border: chOn ? "none" : "1.5px solid #D1D5DB", background: chOn ? "#128AED" : "#FFF", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0 }}>
                                    {chOn && <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="#FFF" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                                  </div>
                                  <span style={{ fontSize: 14, fontWeight: chOn ? 500 : 400, color: "#111928" }}>{child.label}</span>
                                </label>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}

                </div>

                {/* footer */}
                <div style={{ display: "flex", gap: 16, padding: 16, borderTop: "1px solid #E5E7EB", alignItems: "center" }}>
                  {!isDefaultModified && hasCustomDefault ? (
                    <button disabled style={{ display: "flex", alignItems: "center", gap: 8, height: 32, padding: "6px 16px", fontSize: 14, fontWeight: 500, color: "#128AED", background: "transparent", border: "none", cursor: "default", flexShrink: 0 }}>
                      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5 6.5-7" stroke="#128AED" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      Saved as Favorite
                    </button>
                  ) : isDefaultModified ? (
                    <button onClick={saveAsDefault} style={{ display: "flex", alignItems: "center", gap: 8, height: 32, padding: "6px 16px", fontSize: 14, fontWeight: 500, color: "#1F2A37", background: "#FFF", border: "1px solid #D1D5DB", borderRadius: 4, cursor: "pointer", flexShrink: 0 }}>
                      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5l1.96 3.97L14 6.16l-3 2.92.71 4.14L8 11.27 4.29 13.22 5 9.08l-3-2.92 4.04-.69L8 1.5z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round"/></svg>
                      Save as Favorite
                    </button>
                  ) : (
                    <button disabled style={{ display: "flex", alignItems: "center", gap: 8, height: 32, padding: "6px 16px", fontSize: 14, fontWeight: 500, color: "#D1D5DB", background: "rgba(255,255,255,0)", border: "1px solid #D1D5DB", borderRadius: 4, cursor: "default", flexShrink: 0 }}>
                      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5l1.96 3.97L14 6.16l-3 2.92.71 4.14L8 11.27 4.29 13.22 5 9.08l-3-2.92 4.04-.69L8 1.5z" stroke="#D1D5DB" strokeWidth="1.2" strokeLinejoin="round"/></svg>
                      Save as Favorite
                    </button>
                  )}
                  {(() => { const ecChanged = JSON.stringify([...drawerCols].sort()) !== JSON.stringify([...drawerSnapshot.current].sort()); return (
                    <button onClick={ecChanged ? applyDrawerCols : undefined} style={{ display: "flex", flex: 1, height: 32, justifyContent: "center", alignItems: "center", fontSize: 14, fontWeight: 500, color: "#FFF", background: ecChanged ? "#128AED" : "#93C5FD", border: "none", borderRadius: 4, cursor: ecChanged ? "pointer" : "default" }}>Apply</button>
                  ); })()}
                </div>
              </div>
            </>
          )}

        </div>
      </div>
      {/* TOAST */}
      {toast === "ec" && (
        <div style={{ position: "fixed", top: 32, left: "50%", transform: "translateX(-50%)", display: "flex", alignItems: "center", gap: 16, padding: 12, background: "#1F2A37", borderRadius: 8, boxShadow: "0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -2px rgba(0,0,0,.05)", zIndex: 300, animation: toastOut ? "toastOut .35s cubic-bezier(.55,.06,.68,.19) forwards" : "toastIn .4s cubic-bezier(.21,1.02,.73,1) forwards", maxWidth: 520 }}>
          <div style={{ width: 32, height: 32, borderRadius: 5, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.78 7.28l-5.5 5.5a.75.75 0 01-1.06 0l-2.5-2.5a.75.75 0 111.06-1.06L10.75 13.19l4.97-4.97a.75.75 0 111.06 1.06z" fill="#0E9F6E"/></svg>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 3, flex: 1 }}>
            <span style={{ fontSize: 14, fontWeight: 500, color: "#FFF", lineHeight: "20px", fontFamily: "Inter, sans-serif" }}>New column view applied! To return to the original view, click</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}><path d="M3.85355 0.646447C4.04882 0.841709 4.04882 1.15829 3.85355 1.35355L2.20711 3H9C12.3137 3 15 5.68629 15 9C15 12.3137 12.3137 15 9 15C5.68629 15 3 12.3137 3 9C3 8.72386 3.22386 8.5 3.5 8.5C3.77614 8.5 4 8.72386 4 9C4 11.7614 6.23858 14 9 14C11.7614 14 14 11.7614 14 9C14 6.23858 11.7614 4 9 4H2.20711L3.85355 5.64645C4.04882 5.84171 4.04882 6.15829 3.85355 6.35355C3.65829 6.54882 3.34171 6.54882 3.14645 6.35355L0.646447 3.85355C0.451184 3.65829 0.451184 3.34171 0.646447 3.14645L3.14645 0.646447C3.34171 0.451184 3.65829 0.451184 3.85355 0.646447Z" fill="#FFF"/></svg>
            <span style={{ fontSize: 14, fontWeight: 500, color: "#FFF", lineHeight: "20px", fontFamily: "Inter, sans-serif" }}>in the Edit Columns window.</span>
          </div>
          <button onClick={dismissToast} style={{ width: 16, height: 16, display: "flex", alignItems: "center", justifyContent: "center", background: "none", border: "none", cursor: "pointer", padding: 0, flexShrink: 0 }}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="#FFF" strokeWidth="1.2" strokeLinecap="round"/></svg>
          </button>
        </div>
      )}
      <style>{`
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes rowIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-40px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(-50%) translateY(0); } to { opacity: 0; transform: translateX(-50%) translateY(-40px); } }
        .fBtn:hover { background: #F3F4F6 !important; border-color: #D1D5DB !important; }
      `}</style>
    </div>
  );
}

const App = window.__App__;
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
